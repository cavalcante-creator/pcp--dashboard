<title>Planejamento PCP</title>

<style>
*{box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#f5f7fa;margin:20px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.logo{width:200px;margin-top:10px}
.titulo{flex-grow:1;text-align:center;font-size:26px;font-weight:600}
.vazio{width:140px}
.filtros{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;align-items:flex-end}
.filtro-grupo{display:flex;flex-direction:column;gap:4px}
.filtro-grupo label{font-size:13px;font-weight:600;color:#2c3e50}
.filtro-grupo select,.filtro-grupo input{padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:white;min-width:130px}
.filtro-grupo select[multiple]{height:70px}
.botoes-linha{display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.linha h2{background:#2c3e50;color:white;padding:10px;border-radius:8px}
.cards{display:flex;flex-wrap:wrap}
.card{width:260px;padding:12px;margin:8px;border-radius:12px;background:white;box-shadow:0px 4px 12px rgba(0,0,0,0.06);border-left:5px solid transparent}
.producao{border-left:5px solid #a9cce3;background:#f4f9fd}
.pendente{border-left:5px solid #f5b7b1;background:#fdf2f2}
.finalizado{border-left:5px solid #a9dfbf;background:#f3fbf6}
.liberada{border-left:5px solid #f9e79f;background:#fef9e7}
button{margin-top:8px;padding:6px 10px;border:none;border-radius:6px;background:#2c3e50;color:white;cursor:pointer;font-size:13px}
button:hover{background:#3d5166}
.btn-hoje{background:#27ae60}.btn-hoje:hover{background:#229954}
.btn-baixar{background:#2980b9}.btn-baixar:hover{background:#2471a3}
.upload-label{display:inline-block;margin-top:8px;padding:6px 10px;border-radius:6px;background:#5d6d7e;color:white;font-size:12px;cursor:pointer}
.upload-label input{display:none}
.loading{text-align:center;padding:40px;font-size:18px;color:#666}
.erro{text-align:center;padding:30px;font-size:14px;color:#c0392b;background:#fdf2f2;border-radius:8px;margin:10px 0;line-height:1.8}
.checkbox-wrapper{display:flex;align-items:center;gap:6px}
</style>

let dadosTotal = [], ranchosMeta = {}, ranchosB64 = {};

function esc(v){return String(v).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,' ').replace(/\r/g,'')}
function toFloat(v){try{return parseFloat(String(v).replace(/\./g,'').replace(',','.'))||0}catch(e){return 0}}
function nomeLinha(l){return l.replace("BASE_","").replace(/_/g," ")}

function converterData(val) {
  if(!val||String(val).trim()==="") return "";
  const s = String(val).trim();
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
  try {
    const dt = new Date(s);
    if(!isNaN(dt.getTime())) {
      return String(dt.getDate()).padStart(2,'0')+"/"+String(dt.getMonth()+1).padStart(2,'0')+"/"+dt.getFullYear();
    }
  } catch(e) {}
  return s;
}

function getSemana(ds) {
  if(!ds) return "";
  try {
    const p=ds.split('/');if(p.length<3)return"";
    const dt=new Date(+p[2],+p[1]-1,+p[0]);
    const jan1=new Date(dt.getFullYear(),0,1);
    const sem=Math.ceil(((dt-jan1)/86400000+jan1.getDay()+1)/7);
    return "Semana "+sem+"/"+dt.getFullYear();
  } catch(e){return""}
}

function limparStatus(s) {
  if(!s) return "";
  s=String(s).trim().toUpperCase();
  if(s.includes("AGUARDANDO")) return "AGUARDANDO";
  if(s.includes("PRODUÇÃO")||s.includes("PRODUCAO")) return "EM PRODUÇÃO";
  if(s.includes("LIBERADA")) return "LIBERADA";
  return s;
}

function dataInputParaBR(v){if(!v)return"";const p=v.split('-');return p[2]+"/"+p[1]+"/"+p[0]}

function setHoje() {
  const d=new Date();
  document.getElementById("inp-data").value=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  renderizar();
}

function jsonpFetch(url) {
  return new Promise((resolve,reject) => {
    const cb='_cb_'+Date.now()+'_'+Math.round(Math.random()*1e6);
    const s=document.createElement('script');
    let done=false;
    window[cb]=function(data){done=true;delete window[cb];s.remove();resolve(data);};
    s.onerror=function(){if(!done){done=true;delete window[cb];s.remove();reject(new Error('JSONP falhou'));}};
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb+'&_ts='+Date.now();
    document.head.appendChild(s);
    setTimeout(()=>{if(!done){done=true;delete window[cb];s.remove();reject(new Error('Timeout'));}},30000);
  });
}

async function carregarRanchos() {
  try {
    const data=await jsonpFetch(APPS_SCRIPT_URL+'?acao=listar');
    if(typeof data==='object'&&data!==null) {
      for(const[k,v] of Object.entries(data)) {
        const key=String(k).trim();
        ranchosMeta[key]={numero:v.numero||"",nome:v.nome||""};
        ranchosB64[key]=v.base64||"";
      }
    }
  } catch(e){console.warn("Ranchos indisponíveis:",e)}
}

async function carregarDados() {
  const data=await jsonpFetch(APPS_SCRIPT_URL+'?acao=dados');
  if(data&&data.erro) throw new Error(data.erro);
  const lista=[];
  for(const[aba,rows] of Object.entries(data||{})) {
    (rows||[]).forEach(row=>{
      if(!row["Data"]&&row["Z"]) row["Data"]=row["Z"];
      row["Data"]=converterData(row["Data"]);
      row["Nova Data"]=converterData(row["Nova Data"]);
      if(!row["Produto"]&&!row["Ordem"]) return;
      row["Linha"]=aba;
      lista.push(row);
    });
  }
  return lista;
}

function buildEstrutura(dados) {
  const est={};
  for(const item of dados) {
    const linha=nomeLinha(item["Linha"]);
    const dataOrig=item["Data"]||"";
    const novaData=String(item["Nova Data"]||"").trim();
    const turno=item["Turno"]||"Sem Turno";
    const dataUsar=novaData||dataOrig;
    if(!est[linha])est[linha]={};
    if(!est[linha][dataUsar])est[linha][dataUsar]={};
    if(!est[linha][dataUsar][turno])est[linha][dataUsar][turno]=[];
    est[linha][dataUsar][turno].push(item);
  }
  return est;
}

function popularFiltros() {
  const linhas=[...new Set(dadosTotal.map(i=>nomeLinha(i["Linha"])))].sort();
  const turnos=[...new Set(dadosTotal.map(i=>i["Turno"]).filter(Boolean))].sort();
  const semanas=[...new Set(dadosTotal.map(i=>getSemana(i["Data"])).filter(Boolean))].sort();
  const statusList=[...new Set(dadosTotal.map(i=>limparStatus(i["Status"])).filter(Boolean))].sort();
  const selLinha=document.getElementById("sel-linha");
  linhas.forEach(l=>selLinha.add(new Option(l,l)));
  document.getElementById("sel-turno");
  turnos.forEach(t=>document.getElementById("sel-turno").add(new Option(t,t)));
  semanas.forEach(s=>document.getElementById("sel-semana").add(new Option(s,s)));
  statusList.forEach(s=>document.getElementById("sel-status").add(new Option(s,s)));
}

function renderizar() {
  const linhaSel=document.getElementById("sel-linha").value;
  const turnoSel=document.getElementById("sel-turno").value;
  const statusSel=document.getElementById("sel-status").value;
  const semanasSel=[...document.getElementById("sel-semana").selectedOptions].map(o=>o.value);
  const ordemPesq=document.getElementById("inp-ordem").value.trim();
  const produtoPesq=document.getElementById("inp-produto").value.trim().toLowerCase();
  const mostrarTodas=document.getElementById("chk-todas").checked;
  const dataSel=dataInputParaBR(document.getElementById("inp-data").value);
  const estrutura=buildEstrutura(dadosTotal);
  let html="";

  for(const[linha,datas] of Object.entries(estrutura).sort()) {
    if(linhaSel!=="Todas"&&linha!==linhaSel) continue;
    let bloco="<div class='linha'><h2>"+linha+"</h2>";
    let temLinha=false;

    for(const[data,turnos] of Object.entries(datas).sort()) {
      if(!mostrarTodas&&data!==dataSel) continue;
      let itensFiltrados=[];
      for(const[turno,itens] of Object.entries(turnos)) {
        if(turnoSel!=="Todos"&&turno!==turnoSel) continue;
        for(const item of itens) {
          const ordem=String(item["Ordem"]||"").trim();
          const produto=item["Produto"]||"";
          const statusLimpo=limparStatus(item["Status"]);
          if(statusSel!=="Todos"&&statusLimpo!==statusSel) continue;
          if(ordemPesq&&!ordem.includes(ordemPesq)) continue;
          if(produtoPesq&&!produto.toLowerCase().includes(produtoPesq)) continue;
          if(semanasSel.length>0&&!semanasSel.includes(getSemana(item["Data"]||""))) continue;
          itensFiltrados.push(Object.assign({},item,{Ordem:ordem}));
        }
      }
      if(!itensFiltrados.length) continue;
      temLinha=true;
      bloco+="<h3>📅 "+data+"</h3><div class='cards'>";

      for(const item of itensFiltrados) {
        const produto=item["Produto"]||"";
        const ordem=String(item["Ordem"]||"").trim();
        const statusOrig=item["Status"]||"";
        const qtdeTotal=item["Qtde Total"]||"0";
        const qtdePendente=item["Qtde Pendente"]||"0";
        const turnoItem=item["Turno"]||"-";
        const total=toFloat(qtdeTotal),pendente=toFloat(qtdePendente);
        const sl=statusOrig.toLowerCase();
        const classe=sl.includes("liberada")?"liberada":pendente===0?"finalizado":pendente<total?"producao":"pendente";
        const temRancho=ranchosMeta[ordem]!==undefined;
        const srHtml=temRancho
          ?"<span style='color:green;font-size:11px;'>\u2705 Rancho: "+ranchosMeta[ordem].numero+"</span>"
          :"<span style='color:red;font-size:11px;'>\u274c Nenhum rancho</span>";
        const card=document.createElement('div');
        card.className='card '+classe;
        card.innerHTML='<b>'+produto+'</b><br>Ordem: '+ordem+'<br>Turno: '+turnoItem+'<br>Qtde: '+qtdeTotal+'<br>Pendente: '+qtdePendente+'<br>Status: '+statusOrig+'<br>';
        const btnPDF=document.createElement('button');
        btnPDF.textContent='📄 Gerar PDF';
        btnPDF.onclick=function(){gerarPDF(produto,ordem,turnoItem,qtdeTotal,qtdePendente,statusOrig,data,linha);};
        card.appendChild(btnPDF);
        card.innerHTML+='<br>';
        const lbl=document.createElement('label');
        lbl.className='upload-label';
        lbl.textContent='📎 Anexar Rancho';
        const inp=document.createElement('input');
        inp.type='file';inp.accept='application/pdf';
        inp.onchange=function(){anexarRancho(this,ordem);};
        lbl.appendChild(inp);
        card.appendChild(lbl);
        const btnVer=document.createElement('button');
        btnVer.textContent='👁 Ver Rancho';
        btnVer.onclick=function(){verRancho(ordem);};
        card.appendChild(btnVer);
        const statusDiv=document.createElement('div');
        statusDiv.id='status_'+ordem;
        statusDiv.style.cssText='font-size:11px;margin-top:4px;';
        statusDiv.innerHTML=srHtml;
        card.appendChild(statusDiv);
        bloco+=card.outerHTML;
      }
      bloco+="</div>";
    }
    bloco+="</div>";
    if(temLinha) html+=bloco;
  }
  document.getElementById("conteudo").innerHTML=html||"<p style='color:#888;padding:20px'>Nenhum item encontrado.</p>";
}

async function gerarPDF(produto,ordem,turno,qtde,pendente,status,data,linha) {
  const{jsPDF}=window.jspdf;
  const pdf=new jsPDF('p','mm','a4');
  const ML=10,LARGURA=190,PAGE_H=297,MB=10,Y_RODAPE=PAGE_H-MB-95;
  function campo(x,yy,w,h,label,valor){
    pdf.setFontSize(7);pdf.setFont("helvetica","bold");pdf.text(label,x+1,yy-1.2);
    pdf.setDrawColor(180,180,180);pdf.rect(x,yy,w,h);pdf.setDrawColor(0,0,0);
    pdf.setFont("helvetica","normal");pdf.setFontSize(8.5);
    pdf.text(pdf.splitTextToSize(String(valor),w-4),x+3,yy+6);
  }
  let y=6;
  try{const pr=pdf.getImageProperties(LOGO_B64);pdf.addImage(LOGO_B64,'PNG',ML,y,30,(pr.height*30)/pr.width);}catch(e){}
  pdf.setFont("helvetica","bold");pdf.setFontSize(15);pdf.text("ORDEM DE PRODUÇÃO",105,y+9,{align:"center"});y+=15;
  pdf.setFillColor(44,62,80);pdf.rect(ML,y,LARGURA,9,'F');
  pdf.setTextColor(255,255,255);pdf.setFontSize(10.5);pdf.setFont("helvetica","bold");
  pdf.text("DATA: "+data,ML+5,y+6);pdf.text("LINHA: "+String(linha).toUpperCase(),ML+105,y+6);
  pdf.setTextColor(0,0,0);y+=18;
  const CH=10,GAP=4.5;
  const linhaNome=String(linha).toUpperCase().replace(/_/g," ").trim();
  const ehL123=/^LINHA\s*[123]$/.test(linhaNome)||/LINHA\s*[123]\b/.test(linhaNome);
  const nR=(ranchosMeta[ordem]||{}).numero||"";
  campo(ML,y,127,CH,"PRODUTO",produto);campo(ML+129,y,61,CH,"ORDEM",ordem);y+=CH+GAP;
  campo(ML,y,55,CH,"TURNO",turno);campo(ML+57,y,62,CH,"QUANTIDADE PROGRAMADA",qtde);campo(ML+121,y,69,CH,"QUANTIDADE PENDENTE",pendente);y+=CH+GAP;
  campo(ML,y,90,CH,"STATUS",status);campo(ML+92,y,98,CH,"OPERADOR","");y+=CH+GAP;
  if(ehL123){
    const toN=v=>parseFloat(String(v).replace(/\./g,"").replace(",","."))||0;
    const sc=toN(pendente)>0?toN(pendente):0;
    const pF=Math.floor(sc/88),sR=Math.round(sc%88);
    campo(ML,y,90,CH,"RANCHO",nR);campo(ML+92,y,98,CH,"SALDO EM PALETES (88 sc/pal.)",sR>0?pF+" pal. fechados + "+sR+" sc":pF+" paletes fechados");
  }else{campo(ML,y,LARGURA,CH,"RANCHO",nR);}
  y+=CH+5;
  const cols=linhaNome.includes("AREA LIQUIDA")
    ?["HORA INICIO","HORA FIM","N PALLETS","FD","RASGADOS","PAL. DANIF.","EMBAL. ADIC.","PARADAS"]
    :["HORA INICIO","HORA FIM","N PALLETS","SACOS (UN)","RASGADOS","PAL. DANIF.","EMBAL. ADIC.","PARADAS"];
  const lC=LARGURA/cols.length,aC=7.5,aR=5.5;
  pdf.setFillColor(44,62,80);
  for(let i=0;i<cols.length;i++)pdf.rect(ML+i*lC,y,lC,aC,'F');
  pdf.setTextColor(255,255,255);pdf.setFont("helvetica","bold");pdf.setFontSize(7);
  cols.forEach((c,i)=>pdf.text(c,ML+i*lC+1.5,y+4.8));
  pdf.setTextColor(0,0,0);y+=aC;
  pdf.setFont("helvetica","normal");
  for(let r=0;r<9;r++){
    if(r%2===0){pdf.setFillColor(248,249,250);for(let j=0;j<cols.length;j++)pdf.rect(ML+j*lC,y,lC,aR,'F');}
    for(let j=0;j<cols.length;j++)pdf.rect(ML+j*lC,y,lC,aR);y+=aR;
  }
  const yOL=y+5.5,yOB=yOL+3.5,aO=Y_RODAPE-yOB;
  pdf.setFont("helvetica","bold");pdf.setFontSize(8.5);pdf.text("OBSERVAÇÕES:",ML,yOL);
  pdf.setDrawColor(180,180,180);pdf.rect(ML,yOB,LARGURA,aO>20?aO:20);pdf.setDrawColor(0,0,0);
  let yR=Y_RODAPE;
  pdf.setFillColor(235,235,235);pdf.rect(ML,yR,LARGURA,7.5,'F');pdf.rect(ML,yR,LARGURA,7.5);
  pdf.setFont("helvetica","bold");pdf.setFontSize(8.5);pdf.text("STATUS DA ORDEM:",ML+4,yR+5);
  pdf.rect(68,yR+2,3.5,3.5);pdf.setFont("helvetica","normal");pdf.setFontSize(8.5);
  pdf.text("Ordem Finalizada",73,yR+5);pdf.rect(125,yR+2,3.5,3.5);pdf.text("Ordem irá finalizar outro dia",130,yR+5);yR+=20;
  pdf.setFont("helvetica","bold");pdf.setFontSize(8.5);pdf.text("RESP. APONTAMENTO:",ML,yR);pdf.text("ASSINATURA DO OPERADOR:",108,yR);yR+=12;
  pdf.setDrawColor(150,150,150);pdf.line(ML,yR,100,yR);pdf.line(108,yR,200,yR);pdf.setDrawColor(0,0,0);
  pdf.setFont("helvetica","normal");pdf.setFontSize(7.5);pdf.text("Nome / Assinatura",ML,yR+4);pdf.text("Nome / Assinatura",108,yR+4);yR+=12;
  pdf.setFillColor(235,235,235);pdf.rect(ML,yR,LARGURA,7,'F');
  pdf.setFont("helvetica","bold");pdf.setFontSize(8.5);pdf.text("APONTAMENTO NO SISTEMA",105,yR+4.8,{align:"center"});yR+=9;
  function linhaAp(hora,yy){
    pdf.rect(ML,yy,LARGURA,7);pdf.setFont("helvetica","bold");pdf.setFontSize(8);pdf.text(hora,ML+2,yy+4.8);
    pdf.text("Apontado:",ML+14,yy+4.8);pdf.rect(ML+34,yy+1.8,3.5,3.5);
    pdf.setFont("helvetica","normal");pdf.setFontSize(8);pdf.text("Sim",ML+39,yy+4.8);
    pdf.rect(ML+51,yy+1.8,3.5,3.5);pdf.text("Não",ML+56,yy+4.8);
    pdf.setFont("helvetica","bold");pdf.text("Hora:",ML+68,yy+4.8);
    pdf.setDrawColor(180,180,180);pdf.rect(ML+79,yy+0.5,20,6);pdf.text("Data:",ML+101,yy+4.8);
    pdf.rect(ML+111,yy+0.5,22,6);pdf.text("Prod:",ML+135,yy+4.8);
    pdf.rect(ML+145,yy+0.5,20,6);pdf.text("Pend:",ML+167,yy+4.8);
    pdf.rect(ML+177,yy+0.5,13,6);pdf.setDrawColor(0,0,0);
  }
  linhaAp("12:00",yR);yR+=9;linhaAp("17:15",yR);yR+=14;
  pdf.setFillColor(255,249,220);pdf.rect(ML,yR,LARGURA,20,'F');
  pdf.setDrawColor(200,160,0);pdf.rect(ML,yR,LARGURA,20);pdf.setDrawColor(0,0,0);
  pdf.setFont("helvetica","bold");pdf.setFontSize(7.5);pdf.text("INSTRUÇÕES PARA CONTROLE DA PRODUÇÃO",ML+4,yR+5);
  pdf.setFont("helvetica","normal");
  ["• As ordens de fabricação devem ser fabricadas até a quantidade final para melhor controle da produção diária.",
   "• Favor entregar esta folha ao responsável às 12:00 e às 17:15 para o apontamento no sistema.",
   "• Sinalizar acima se a ordem foi finalizada ou se sobrou material e continuará no próximo dia."
  ].forEach((t,idx)=>pdf.text(t,ML+4,yR+9.5+idx*4));
  const b64R=ranchosB64[ordem]||null;
  if(b64R&&b64R.length>100){
    try{
      const{PDFDocument}=PDFLib;
      const pB=pdf.output('arraybuffer');
      const bn=atob(b64R);const rb=new Uint8Array(bn.length);
      for(let i=0;i<bn.length;i++)rb[i]=bn.charCodeAt(i);
      const dF=await PDFDocument.load(pB);const dR=await PDFDocument.load(rb,{ignoreEncryption:true});
      const pgs=await dF.copyPages(dR,dR.getPageIndices());pgs.forEach(p=>dF.addPage(p));
      const by=await dF.save();const bl=new Blob([by],{type:'application/pdf'});
      const ur=URL.createObjectURL(bl);const a=document.createElement('a');
      a.href=ur;a.download='ordem_producao.pdf';a.click();
      setTimeout(()=>URL.revokeObjectURL(ur),3000);return;
    }catch(e){alert("Não foi possível mesclar o rancho. Baixando só a ordem...");}
  }
  pdf.save("ordem_producao.pdf");
}

function verRancho(ordem){
  const b64=ranchosB64[ordem];
  if(!b64){alert("Nenhum rancho anexado para essa ordem");return;}
  const w=window.open("","_blank");
  w.document.write('<html><head><title>Rancho</title></head><body style="margin:0"><iframe src="data:application/pdf;base64,'+b64+'" width="100%" height="100%" style="border:none;"></iframe></body></html>');
  w.document.close();
}

function anexarRancho(input,ordem){
  const file=input.files[0];if(!file)return;
  const sel=document.getElementById("status_"+ordem);
  if(sel){sel.innerHTML="⏳ Enviando...";sel.style.color="orange";}
  const reader=new FileReader();
  reader.onload=function(e){
    const b64=e.target.result.split(",")[1];
    let nr="";
    try{const d=atob(b64);const m=d.match(/rancho\s*\(?\s*(\d+)/i);if(m)nr=m[1];}catch(err){}
    if(!nr)nr=prompt("Número do rancho não identificado. Digite manualmente:")||"Não informado";
    const form=document.createElement("form");
    form.method="POST";form.action=APPS_SCRIPT_URL;form.target="upload_target";form.style.display="none";
    [["acao","salvar"],["ordem",ordem],["numero",nr],["nome",file.name],["b64",b64]].forEach(([n,v])=>{
      const i=document.createElement("input");i.type="hidden";i.name=n;i.value=v;form.appendChild(i);
    });
    document.body.appendChild(form);form.submit();
    setTimeout(()=>{
      ranchosMeta[ordem]={numero:nr,nome:file.name};ranchosB64[ordem]=b64;
      if(sel){sel.innerHTML="✅ Rancho: "+nr;sel.style.color="green";}
      form.remove();
    },1500);
  };
  reader.readAsDataURL(file);
}
